<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Poker Blind Timer</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #0f0f0f;
    color: #f5f5f5;
    text-align: center;
}

/* layout */
.box {
    padding: 20px;
}

h1 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 20px;
    opacity: 0.8;
}

.big {
    font-size: 28px;
    margin: 10px 0;
}

#time {
    font-size: 64px;
    font-weight: 600;
    margin-top: 10px;
}

/* buttons */
button {
    font-size: 14px;
    padding: 10px 12px;
    margin: 4px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: #fff;
}

button:active {
    opacity: 0.6;
}

.control-panel {
    margin-top: 20px;
}

/* 🔥 FOCUS MODE (เต็มจอจริง) */
.focus-mode {
    position: fixed;
    inset: 0;
    background: #0f0f0f;
    z-index: 9999;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    padding: 20px;
}

/* ซ่อนทุกอย่างที่ไม่จำเป็น */
.focus-mode .control-panel,
.focus-mode h1,
.focus-mode #totalTime {
    display: none;
}

/* ขยายให้เต็มจอมือถือ */
.focus-mode .big {
    font-size: 36px;
}

.focus-mode #time {
    font-size: 90px;
}

/* มือถือ */
@media (max-width: 600px) {
    #time {
        font-size: 56px;
    }

    .focus-mode #time {
        font-size: 80px;
    }

    .big {
        font-size: 22px;
    }
}
</style>
</head>

<body>

<div class="box">
    <h1>Poker Timer</h1>

    <div class="big">Level: <span id="level">1</span></div>

    <div class="big">
        Blind: <span id="blind">-</span>
        <div style="font-size:14px; opacity:0.5;">
            <span id="prevBlind">-</span> | <span id="nextBlind">-</span>
        </div>
    </div>

    <div class="big">Time</div>
    <div id="time">00:00</div>

    <div class="control-panel">
        <br>

        <button onclick="startTimer()">Start</button>
        <button onclick="pauseTimer()">Pause</button>

        <br>

        <button onclick="addMinute()">+1m</button>
        <button onclick="minusMinute()">-1m</button>
        <button onclick="addTime()">+10s</button>
        <button onclick="fastForward()">-10s</button>

        <br>

        <button onclick="increaseLevel()">Lv+</button>
        <button onclick="decreaseLevel()">Lv-</button>
        <button onclick="skipBreak()">Skip Break</button>

        <br>

        <button onclick="resetTimer()">Reset</button>
        <button onclick="toggleFocus()">Focus</button>

        <br>

        <div style="margin-top:10px; opacity:0.6;">
            <span id="totalTime">00:00:00</span>
        </div>
    </div>
</div>

<script>
// ===== (logic เดิมคุณ 100% ไม่แตะ) =====
let level = 1;
let timer;
let totalTimer;
let timeLeft = 0;
let levelTime;
let totalSeconds = 0;
let isBreak = false;

const breakLevels = [5, 10, 15, 20, 25];
const breakTime = 300;

const blindLevels = [
    { small: 20, big: 40 },
    { small: 40, big: 60 },
    { small: 40, big: 80 },
    { small: 60, big: 100 }, 
    { small: 80, big: 120 },
    { small: 100, big: 150 },
    { small: 100, big: 200 },
    { small: 200, big: 300 },
    { small: 200, big: 400 },
    { small: 300, big: 500 },
    { small: 400, big: 600 },
    { small: 500, big: 800 },
    { small: 600, big: 1000 },
    { small: 800, big: 1200 },
    { small: 1000, big: 1500 },
    { small: 1500, big: 2000 },
    { small: 2000, big: 3000 },
    { small: 3000, big: 5000 },
];

let audioCtx;
let audioUnlocked = false;

function unlockAudio() {
    if (audioUnlocked) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const buffer = audioCtx.createBuffer(1, 1, 22050);
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);
    source.start(0);
    audioUnlocked = true;
}

function beep(freq = 800, duration = 0.2) {
    if (!audioUnlocked) return;
    if (audioCtx.state === "suspended") audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    gain.gain.setValueAtTime(1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.stop(audioCtx.currentTime + duration);
}

function playWarningSound() { beep(1000, 0.1); }
function playLevelUpSound() { beep(600, 0.2); setTimeout(() => beep(900, 0.2), 150); }

function saveState() {
    localStorage.setItem("level", level);
    localStorage.setItem("timeLeft", timeLeft);
    localStorage.setItem("totalSeconds", totalSeconds);
    localStorage.setItem("isBreak", isBreak);
}

function loadState() {
    level = parseInt(localStorage.getItem("level")) || 1;
    timeLeft = parseInt(localStorage.getItem("timeLeft")) || 0;
    totalSeconds = parseInt(localStorage.getItem("totalSeconds")) || 0;
    isBreak = localStorage.getItem("isBreak") === "true";
}

function getLevelTime() { return level <= 14 ? 600 : 480; }

function startTimer() {
    unlockAudio();
    clearInterval(timer);
    clearInterval(totalTimer);

    levelTime = getLevelTime();
    if (!timeLeft) timeLeft = levelTime;

    updateBlind();
    updateDisplay();

    totalTimer = setInterval(() => {
        if (!isBreak) {
            totalSeconds++;
            updateTotalTime();
        }
    }, 1000);

    timer = setInterval(() => {
        timeLeft--;

        if (timeLeft <= 10 && timeLeft > 0) playWarningSound();

        saveState();
        updateDisplay();

        if (timeLeft <= 0) {

            if (isBreak) {
                isBreak = false;
                level++;
                playLevelUpSound();
                timeLeft = getLevelTime();
                updateBlind();
                return;
            }

            if (breakLevels.includes(level)) {
                isBreak = true;
                timeLeft = breakTime;
                document.getElementById("blind").innerText = "BREAK TIME";
                alert("พักเบรค!");
                return;
            }

            level++;
            playLevelUpSound();
            timeLeft = getLevelTime();
            updateBlind();
        }
    }, 1000);
}

function pauseTimer() {
    clearInterval(timer);
    clearInterval(totalTimer);
}

function resetTimer() {
    clearInterval(timer);
    clearInterval(totalTimer);
    localStorage.clear();

    level = 1;
    timeLeft = 0;
    totalSeconds = 0;
    isBreak = false;

    document.getElementById("level").innerText = level;
    document.getElementById("blind").innerText = "-";
    document.getElementById("time").innerText = "00:00";
    document.getElementById("totalTime").innerText = "00:00:00";
}

function updateDisplay() {
    let min = Math.floor(timeLeft / 60);
    let sec = timeLeft % 60;

    document.getElementById("time").innerText =
        String(min).padStart(2, '0') + ":" +
        String(sec).padStart(2, '0');

    document.getElementById("level").innerText = level;
}

function updateTotalTime() {
    let h = Math.floor(totalSeconds / 3600);
    let m = Math.floor((totalSeconds % 3600) / 60);
    let s = totalSeconds % 60;

    document.getElementById("totalTime").innerText =
        String(h).padStart(2, '0') + ":" +
        String(m).padStart(2, '0') + ":" +
        String(s).padStart(2, '0');
}

function getBlindAtLevel(lv) {
    if (lv <= blindLevels.length) return blindLevels[lv - 1];
    let last = blindLevels.at(-1);
    let step = lv - blindLevels.length;
    return {
        small: last.small + (step * 200),
        big: last.big + (step * 400)
    };
}

function updateBlind() {
    if (isBreak) {
        document.getElementById("blind").innerText = "BREAK TIME";
        document.getElementById("prevBlind").innerText = "-";
        document.getElementById("nextBlind").innerText = "-";
        return;
    }

    let c = getBlindAtLevel(level);
    let p = level > 1 ? getBlindAtLevel(level - 1) : null;
    let n = getBlindAtLevel(level + 1);

    document.getElementById("blind").innerText = c.small + " / " + c.big;
    document.getElementById("prevBlind").innerText = p ? p.small + " / " + p.big : "-";
    document.getElementById("nextBlind").innerText = n.small + " / " + n.big;
}

function increaseLevel(){ level++; updateBlind(); saveState(); }
function decreaseLevel(){ if(level>1) level--; updateBlind(); saveState(); }
function addTime(){ timeLeft+=10; }
function fastForward(){ timeLeft-=10; if(timeLeft<0) timeLeft=0; saveState(); }

function skipBreak(){
    if(!isBreak) return;
    isBreak=false;
    level++;
    timeLeft=getLevelTime();
    playLevelUpSound();
    updateBlind();
    saveState();
}

function addMinute(){ timeLeft+=60; saveState(); }
function minusMinute(){ timeLeft-=60; if(timeLeft<0) timeLeft=0; saveState(); }

// 🔥 Focus (เต็มจอจริง)
let isFocus = false;
function toggleFocus(){
    isFocus = !isFocus;
    document.body.classList.toggle("focus-mode", isFocus);
}

window.onload = () => {
    loadState();
    updateBlind();
    updateDisplay();
    updateTotalTime();
};
</script>

</body>
</html>
