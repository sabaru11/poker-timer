<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Poker Blind Timer</title>

<style>
    body {
        font-family: Arial;
        text-align: center;
        background: #0d0d0d;
        color: #fff;
    }
    .box {
        margin-top: 50px;
    }
    h1 {
        font-size: 40px;
    }
    .big {
        font-size: 32px;
        margin: 10px;
    }
    button {
        font-size: 18px;
        padding: 10px;
        margin: 5px;
    }
    input {
        font-size: 18px;
        padding: 5px;
    }
</style>
</head>

<body>

<div class="box">
    <h1>🎲 Poker BT Tour</h1>

    <div class="big">Level: <span id="level">1</span></div>
    <div class="big">Blind: <span id="blind">-</span></div>
    <div class="big">Time: <span id="time">00:00</span></div>

    <br>

    <label>เวลา / เลเวล (นาที): </label>
    <input type="number" id="minutes" value="5">

    <br><br>

    <!-- <button onclick="unlockAudio()">🔊 เปิดเสียง</button> -->
    <!-- <br><br> -->

    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>

    <br>

    <button onclick="increaseLevel()">➕ Level</button>
    <button onclick="decreaseLevel()">➖ Level</button>
    <button onclick="addTime()">➕ +10 วิ</button>
    <button onclick="fastForward()">⏩ -10 วิ</button>
</div>

<script>
let level = 1;
let timer;
let timeLeft = 0;
let levelTime;

let smallBlind = 0;
let bigBlind = 0;

// 🔊 Web Audio (ตัวจบ iPhone)
let audioCtx;
let audioUnlocked = false;

function unlockAudio() {
    if (audioUnlocked) return;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const buffer = audioCtx.createBuffer(1, 1, 22050);
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);
    source.start(0);

    audioUnlocked = true;
    alert("🔊 เสียงพร้อมแล้ว");
}

function beep(freq = 800, duration = 0.2) {
    if (!audioUnlocked) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();

    gain.gain.setValueAtTime(1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(
        0.001,
        audioCtx.currentTime + duration
    );

    osc.stop(audioCtx.currentTime + duration);
}

function playWarningSound() {
    beep(1000, 0.1);
}

function playLevelUpSound() {
    beep(600, 0.2);
    setTimeout(() => beep(900, 0.2), 150);
}

// 🎯 Blind
const blindLevels = [
    { small: 50, big: 50 },
    { small: 50, big: 100 },
    { small: 50, big: 150 },
    { small: 100, big: 200 },
    { small: 150, big: 300 }, // LV5
    { small: 250, big: 400 }, // ฉะลอเกม
    { small: 200, big: 400 },
    { small: 250, big: 500 },
    { small: 300, big: 600 },
    { small: 350, big: 700 },
    { small: 400, big: 800 },
    { small: 450, big: 900 },
    { small: 500, big: 1000 },
    { small: 600, big: 1200 },
    { small: 800, big: 1600 },
    { small: 1000, big: 2000 }
];

// ▶️ Start
function startTimer() {
    unlockAudio();

    clearInterval(timer);

    levelTime = parseInt(document.getElementById("minutes").value) * 60;

    if (!timeLeft) timeLeft = levelTime;

    updateBlind();
    updateDisplay();

    timer = setInterval(() => {
        timeLeft--;

        if (timeLeft <= 10 && timeLeft > 0) {
            playWarningSound();
        }

        updateDisplay();

        if (timeLeft <= 0) {
            level++;
            timeLeft = levelTime;

            playLevelUpSound();
            updateBlind();
        }
    }, 1000);
}

// ⏸
function pauseTimer() {
    clearInterval(timer);
}

// 🔄
function resetTimer() {
    clearInterval(timer);
    level = 1;
    timeLeft = 0;

    document.getElementById("level").innerText = level;
    document.getElementById("blind").innerText = "-";
    document.getElementById("time").innerText = "00:00";
}

// ⏱
function updateDisplay() {
    let min = Math.floor(timeLeft / 60);
    let sec = timeLeft % 60;

    document.getElementById("time").innerText =
        String(min).padStart(2, '0') + ":" +
        String(sec).padStart(2, '0');

    document.getElementById("level").innerText = level;
}

// 💰 Blind
function updateBlind() {
    let current;

    if (level <= blindLevels.length) {
        current = blindLevels[level - 1];
    } else {
        let last = blindLevels[blindLevels.length - 1];
        let step = level - blindLevels.length;

        let small = last.small + (step * 200);
        let big = last.big + (step * 400);

        current = { small: small, big: big };
    }

    smallBlind = current.small;
    bigBlind = current.big;

    document.getElementById("blind").innerText =
        smallBlind + " / " + bigBlind;
}

// ➕➖ Level
function increaseLevel() {
    level++;
    updateBlind();
}

function decreaseLevel() {
    if (level > 1) level--;
    updateBlind();
}

// ⏩ เวลา
function addTime() {
    timeLeft += 10;
}

function fastForward() {
    timeLeft -= 10;
    if (timeLeft < 0) timeLeft = 0;
}
</script>

</body>
</html>
