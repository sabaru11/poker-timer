<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Poker Blind Timer</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
    background: radial-gradient(circle at top, #1a1a1a, #050505);
    color: #fff;
    margin: 0;
}

.box {
    margin-top: 40px;
    padding: 20px;
}

h1 {
    font-size: 38px;
    margin-bottom: 20px;
    color: #00d4ff;
    text-shadow: 0 0 10px rgba(0,212,255,0.6);
}

.big {
    font-size: 32px;
    margin: 10px;
}

#time {
    font-size: 60px;
    font-weight: bold;
    color: #00ff9d;
    text-shadow: 0 0 20px rgba(0,255,157,0.6);
}

button {
    font-size: 16px;
    padding: 10px 14px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    background: #111;
    color: #fff;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #00d4ff;
    color: #000;
}

.control-panel {
    margin-top: 20px;
}

/* 🎥 Focus Mode */
.focus-mode .control-panel,
.focus-mode h1,
.focus-mode #totalTime {
    display: none;
}

.focus-mode .big {
    font-size: 40px;
}

.focus-mode #time {
    font-size: 90px;
}

/* 📱 Mobile */
@media (max-width: 600px) {
    .big {
        font-size: 24px;
    }

    #time {
        font-size: 48px;
    }

    button {
        font-size: 14px;
        padding: 8px;
    }
}
</style>
</head>

<body>

<div class="box">
    <h1>🎲 Poker BT Tour</h1>

    <div class="big">Level: <span id="level">1</span></div>

    <div class="big">
        Blind: <span id="blind">-</span>
        <div style="font-size:16px; opacity:0.7;">
            Old level: <span id="prevBlind">-</span> |
            Next level: <span id="nextBlind">-</span>
        </div>
    </div>

    <div class="big">Time: <span id="time">00:00</span></div>

    <div class="control-panel">
        <br>

        <button onclick="startTimer()">Start</button>
        <button onclick="pauseTimer()">Pause</button>

        <br>

        <button onclick="addMinute()">➕ +1 นาที</button>
        <button onclick="minusMinute()">➖ -1 นาที</button>
        <button onclick="addTime()">➕ +10 วิ</button>
        <button onclick="fastForward()">⏩ -10 วิ</button>

        <br>

        <button onclick="increaseLevel()">➕ Level</button>
        <button onclick="decreaseLevel()">➖ Level</button>
        <button onclick="skipBreak()">⏭️ ข้ามพัก</button>

        <br>

        <button onclick="resetTimer()">Reset</button>

        <br><br>

        <!-- 🎥 Focus -->
        <button onclick="toggleFocus()">🎥 Focus Mode</button>

        <br>

        <div class="big">Total Time: <span id="totalTime">00:00:00</span></div>
    </div>
</div>

<script>
let level = 1;
let timer;
let totalTimer;
let timeLeft = 0;
let levelTime;

let totalSeconds = 0;

let isBreak = false;

// 🔥 ตั้งค่า Break
const breakLevels = [5, 10, 15, 20, 25];
const breakTime = 300;

// 🎯 Blind
const blindLevels = [
    { small: 20, big: 40 },
    { small: 40, big: 60 },
    { small: 40, big: 80 },
    { small: 60, big: 100 }, 
    { small: 80, big: 120 },
    { small: 100, big: 150 },
    { small: 100, big: 200 },
    { small: 200, big: 300 },
    { small: 200, big: 400 },
    { small: 300, big: 500 },
    { small: 400, big: 600 },
    { small: 500, big: 800 },
    { small: 600, big: 1000 },
    { small: 800, big: 1200 },
    { small: 1000, big: 1500 },
    { small: 1500, big: 2000 },
    { small: 2000, big: 3000 },
    { small: 3000, big: 5000 },
];

// 🔊 เสียง
let audioCtx;
let audioUnlocked = false;

function unlockAudio() {
    if (audioUnlocked) return;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const buffer = audioCtx.createBuffer(1, 1, 22050);
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);
    source.start(0);

    audioUnlocked = true;
}

function beep(freq = 800, duration = 0.2) {
    if (!audioUnlocked) return;

    if (audioCtx.state === "suspended") {
        audioCtx.resume();
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();

    gain.gain.setValueAtTime(1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(
        0.001,
        audioCtx.currentTime + duration
    );

    osc.stop(audioCtx.currentTime + duration);
}

function playWarningSound() {
    beep(1000, 0.1);
}

function playLevelUpSound() {
    beep(600, 0.2);
    setTimeout(() => beep(900, 0.2), 150);
}

// 💾 save/load
function saveState() {
    localStorage.setItem("level", level);
    localStorage.setItem("timeLeft", timeLeft);
    localStorage.setItem("totalSeconds", totalSeconds);
    localStorage.setItem("isBreak", isBreak);
}

function loadState() {
    level = parseInt(localStorage.getItem("level")) || 1;
    timeLeft = parseInt(localStorage.getItem("timeLeft")) || 0;
    totalSeconds = parseInt(localStorage.getItem("totalSeconds")) || 0;
    isBreak = localStorage.getItem("isBreak") === "true";
}

// ⏱
function getLevelTime() {
    return level <= 14 ? 600 : 480;
}

// ▶️
function startTimer() {
    unlockAudio();

    clearInterval(timer);
    clearInterval(totalTimer);

    levelTime = getLevelTime();

    if (!timeLeft) timeLeft = levelTime;

    updateBlind();
    updateDisplay();

    totalTimer = setInterval(() => {
        if (!isBreak) {
            totalSeconds++;
            updateTotalTime();
        }
    }, 1000);

    timer = setInterval(() => {
        timeLeft--;

        if (timeLeft <= 10 && timeLeft > 0) {
            playWarningSound();
        }

        saveState();
        updateDisplay();

        if (timeLeft <= 0) {

            if (isBreak) {
                isBreak = false;
                level++;
                playLevelUpSound();
                levelTime = getLevelTime();
                timeLeft = levelTime;
                updateBlind();
                return;
            }

            if (breakLevels.includes(level)) {
                isBreak = true;
                timeLeft = breakTime;
                document.getElementById("blind").innerText = "BREAK TIME";
                alert("⏸️ พักเบรค!");
                return;
            }

            level++;
            playLevelUpSound();
            levelTime = getLevelTime();
            timeLeft = levelTime;
            updateBlind();
        }
    }, 1000);
}

// ⏸
function pauseTimer() {
    clearInterval(timer);
    clearInterval(totalTimer);
}

// 🔄
function resetTimer() {
    clearInterval(timer);
    clearInterval(totalTimer);
    localStorage.clear();

    level = 1;
    timeLeft = 0;
    totalSeconds = 0;
    isBreak = false;

    document.getElementById("level").innerText = level;
    document.getElementById("blind").innerText = "-";
    document.getElementById("time").innerText = "00:00";
    document.getElementById("totalTime").innerText = "00:00:00";
}

// ⏱
function updateDisplay() {
    let min = Math.floor(timeLeft / 60);
    let sec = timeLeft % 60;

    document.getElementById("time").innerText =
        String(min).padStart(2, '0') + ":" +
        String(sec).padStart(2, '0');

    document.getElementById("level").innerText = level;
}

// 🕒
function updateTotalTime() {
    let h = Math.floor(totalSeconds / 3600);
    let m = Math.floor((totalSeconds % 3600) / 60);
    let s = totalSeconds % 60;

    document.getElementById("totalTime").innerText =
        String(h).padStart(2, '0') + ":" +
        String(m).padStart(2, '0') + ":" +
        String(s).padStart(2, '0');
}

function getBlindAtLevel(lv) {
    if (lv <= blindLevels.length) {
        return blindLevels[lv - 1];
    } else {
        let last = blindLevels[blindLevels.length - 1];
        let step = lv - blindLevels.length;

        return {
            small: last.small + (step * 200),
            big: last.big + (step * 400)
        };
    }
}

// 💰
function updateBlind() {
    if (isBreak) {
        document.getElementById("blind").innerText = "BREAK TIME";
        document.getElementById("prevBlind").innerText = "-";
        document.getElementById("nextBlind").innerText = "-";
        return;
    }

    let current = getBlindAtLevel(level);
    let prev = level > 1 ? getBlindAtLevel(level - 1) : null;
    let next = getBlindAtLevel(level + 1);

    document.getElementById("blind").innerText =
        current.small + " / " + current.big;

    document.getElementById("prevBlind").innerText =
        prev ? (prev.small + " / " + prev.big) : "-";

    document.getElementById("nextBlind").innerText =
        next.small + " / " + next.big;
}

// ➕➖
function increaseLevel() {
    level++;
    levelTime = getLevelTime();
    updateBlind();
    saveState();
}

function decreaseLevel() {
    if (level > 1) level--;
    updateBlind();
    saveState();
}

function addTime() { timeLeft += 10; }
function fastForward() {
    timeLeft -= 10;
    if (timeLeft < 0) timeLeft = 0;
    saveState();
}

function skipBreak() {
    if (!isBreak) return;
    isBreak = false;
    level++;
    levelTime = getLevelTime();
    timeLeft = levelTime;
    playLevelUpSound();
    updateBlind();
    saveState();
}

function addMinute() {
    timeLeft += 60;
    saveState();
}

function minusMinute() {
    timeLeft -= 60;
    if (timeLeft < 0) timeLeft = 0;
    saveState();
}

// 🎥 Focus
let isFocus = false;
function toggleFocus() {
    isFocus = !isFocus;

    if (isFocus) {
        document.body.classList.add("focus-mode");
        document.documentElement.requestFullscreen?.();
    } else {
        document.body.classList.remove("focus-mode");
        document.exitFullscreen?.();
    }
}

window.onload = () => {
    loadState();
    updateBlind();
    updateDisplay();
    updateTotalTime();
};
</script>

</body>
</html>
